<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athlete Reviews — Pumping Iron Creatine</title>
    <meta name="description" content="Read verified reviews from athletes across Kiambu County using Pumping Iron's weight-calculated creatine pre-portioned sachets." />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ==================== YOUR ORIGINAL STYLES (unchanged) ==================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #C0181A;
            --red-dark: #8B0F11;
            --black: #0D0D0D;
            --dark: #1A1A1A;
            --card: #222222;
            --border: #333333;
            --gray: #888888;
            --light: #CCCCCC;
            --white: #F5F5F5;
            --font-display: 'Bebas Neue', sans-serif;
            --font-head: 'Barlow Condensed', sans-serif;
            --font-body: 'Inter', sans-serif;
            --star-gold: #FFC107;
            --star-dim: #444444;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 5rem;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(13, 13, 13, 0.92);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--red);
            letter-spacing: 0.05em;
            text-decoration: none;
        }

        .nav-order {
            background: var(--red);
            color: var(--white);
            border: none;
            font-family: var(--font-head);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .nav-order:hover {
            background: var(--red-dark);
        }

        .wrapper {
            padding: 7rem 1.5rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .reviews-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .reviews-layout {
                grid-template-columns: 1fr;
                gap: 2.5rem;
            }
        }

        .section-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            line-height: 1;
            margin-bottom: 2rem;
            text-align: center;
            text-transform: uppercase;
        }

        /* ── REVIEW FORM ── */
        .review-box {
            background: var(--dark);
            border: 1px solid var(--border);
            border-top: 3px solid var(--red);
            padding: 2.5rem 1.5rem;
            position: sticky;
            top: 100px;
        }

        .form-heading {
            font-family: var(--font-head);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-family: var(--font-head);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--gray);
            text-transform: uppercase;
        }

        .form-input,
        .form-textarea {
            background: var(--black);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 1rem;
            padding: 0.85rem 1rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--red);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--border);
        }

        /* ── STAR RATING (Google-style) ── */
        .star-group {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.35rem;
        }

        .star-group input {
            display: none;
        }

        .star-group label {
            font-size: 2.2rem;
            color: var(--star-dim);
            cursor: pointer;
            transition: color 0.12s ease;
            line-height: 1;
            user-select: none;
        }

        /* Hover and checked states (CSS fallback) */
        .star-group label:hover,
        .star-group label:hover\~label,
        .star-group input:checked\~label {
            color: var(--star-gold);
        }

        /* ── SUBMIT ── */
        .submit-btn {
            background: var(--red);
            color: var(--white);
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            padding: 1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: var(--red-dark);
        }

        .submit-btn:disabled {
            background: var(--border);
            color: var(--gray);
            cursor: not-allowed;
        }

        /* ── FEED ── */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }

        .feed-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            letter-spacing: 0.05em;
        }

        .feed-count {
            font-family: var(--font-head);
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* ── REVIEW CARD ── */
        .review-card {
            background: var(--dark);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .athlete-name {
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--white);
            text-transform: uppercase;
        }

        .card-stars {
            color: var(--star-gold);
            font-size: 1.1rem;
            letter-spacing: 0.1em;
        }

        .card-text {
            font-size: 0.95rem;
            color: var(--light);
            line-height: 1.6;
            white-space: pre-line;
        }

        .card-date {
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 1rem;
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray);
            border: 1px dashed var(--border);
            font-size: 0.9rem;
        }

        .empty-state.error {
            color: var(--red);
            border-color: var(--red);
        }

        .text-error {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        footer {
            background: var(--dark);
            border-top: 1px solid var(--border);
            padding: 2rem 1.5rem;
            text-align: center;
            margin-top: 4rem;
        }

        .footer-brand {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--red);
            margin-bottom: 0.5rem;
        }

        .footer-sub {
            font-size: 0.85rem;
            color: var(--gray);
        }
    </style>
</head>
<body>

    <nav>
        <span class="nav-brand">PUMPING IRON</span>
        <div style="display:flex; gap:1.25rem; align-items:center;">
            <a href="index.html" class="nav-brand">Home</a>
            <a class="nav-order" href="index.html#calculator">GET MY DOSE</a>
        </div>
    </nav>

    <div class="wrapper">
        <h1 class="section-title">Reviews</h1>

        <div class="reviews-layout">

            <!-- LEFT: Review Form -->
            <div>
                <div class="review-box">
                    <div class="form-heading">Your Feedback</div>
                    <form id="submissionForm">
                        <div class="form-group">
                            <label class="form-label" for="athleteName">Your Name / Gym Handle</label>
                            <input class="form-input" type="text" id="athleteName" placeholder="e.g., Alex K. (Ruiru Hub)" required />
                        </div>

                        <div class="form-group">
                            <label class="form-label">Product Rating</label>
                            <div class="star-group" id="starSelector">
                                <input type="radio" id="star5" name="rating" value="5" required />
                                <label for="star5" title="5 Stars">★</label>
                                <input type="radio" id="star4" name="rating" value="4" />
                                <label for="star4" title="4 Stars">★</label>
                                <input type="radio" id="star3" name="rating" value="3" />
                                <label for="star3" title="3 Stars">★</label>
                                <input type="radio" id="star2" name="rating" value="2" />
                                <label for="star2" title="2 Stars">★</label>
                                <input type="radio" id="star1" name="rating" value="1" />
                                <label for="star1" title="1 Star">★</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="feedbackText">Leave a review</label>
                            <textarea class="form-textarea" id="feedbackText" rows="5" placeholder="How has the custom weight dosing impacted your recovery or power output?" required></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="submit-btn">Submit Review</button>
                        <div id="formFeedback" class="text-error" style="margin-top:0.5rem;"></div>
                    </form>
                </div>
            </div>

            <!-- RIGHT: Published Reviews -->
            <div>
                <div class="feed-header">
                    <span class="feed-title">Community Reviews</span>
                    <span id="countDisplay" class="feed-count"></span>
                </div>

                <div id="feedContainer">
                    <div class="empty-state">Loading reviews…</div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <div class="footer-brand">PUMPING IRON</div>
        <div class="footer-sub">Gym Nutrition Prep Service · Kiambu County</div>
    </footer>

    <script>
        // ─── SUPABASE CONFIG ──────────────────────────────────────────────
        const SUPABASE_URL = "https://zhdpiscqxaowjrfidfis.supabase.co";
        const SUPABASE_ANON_KEY =
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoZHBpc2NxeGFvd2pyZmlkZmlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDEwNjQsImV4cCI6MjA5NzkxNzA2NH0.RH9CQ6uAYmwqBJaChQdXGrJjVJ6phIVhVBRfmm0Itec";

        // ─── INIT CLIENT ──────────────────────────────────────────────────
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ─── HELPERS ──────────────────────────────────────────────────────
        function sanitize(input) {
            if (!input) return "";
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
            return input.replace(/[&<>'"]/g, (ch) => map[ch] || ch);
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-KE', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function renderStars(rating) {
            return '★'.repeat(rating) + '☆'.repeat(5 - rating);
        }

        // ─── FETCH & RENDER ──────────────────────────────────────────────
        async function fetchAndRenderReviews() {
            const container = document.getElementById('feedContainer');
            const counter = document.getElementById('countDisplay');

            try {
                const { data: reviews, error } = await supabaseClient
                    .from('reviews')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Supabase fetch error:', error);
                    container.innerHTML =
                        `<div class="empty-state error">❌ Could not fetch reviews: ${error.message || 'Unknown error'}</div>`;
                    counter.textContent = '⚠️';
                    return;
                }

                const count = reviews?.length || 0;
                counter.textContent = count + ' Review' + (count !== 1 ? 's' : '');

                container.innerHTML = '';

                if (!reviews || count === 0) {
                    container.innerHTML =
                        '<div class="empty-state">No athlete logs documented yet. Be the first to drop your training feedback on the left!</div>';
                    return;
                }

                for (const item of reviews) {
                    const card = document.createElement('div');
                    card.className = 'review-card';
                    card.innerHTML = `
                        <div class="card-top">
                            <div class="athlete-name">${sanitize(item.name)}</div>
                            <div class="card-stars">${renderStars(item.rating)}</div>
                        </div>
                        <div class="card-text">${sanitize(item.text)}</div>
                        <div class="card-date">${formatDate(item.created_at)}</div>
                    `;
                    container.appendChild(card);
                }

            } catch (err) {
                console.error('Unexpected fetch error:', err);
                container.innerHTML =
                    `<div class="empty-state error">⚠️ Unexpected error: ${err.message || 'Please try again later.'}</div>`;
                counter.textContent = '⚠️';
            }
        }

        // ─── SUBMIT ──────────────────────────────────────────────────────
        document.getElementById('submissionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const nameEl = document.getElementById('athleteName');
            const textEl = document.getElementById('feedbackText');
            const ratingEl = document.querySelector('input[name="rating"]:checked');
            const formFeedback = document.getElementById('formFeedback');

            formFeedback.textContent = '';

            const name = nameEl.value.trim();
            const text = textEl.value.trim();
            const rating = ratingEl ? parseInt(ratingEl.value, 10) : null;

            if (!name || !text || !rating) {
                formFeedback.textContent = 'Please fill all fields and select a rating.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting…';

            try {
                const { data, error } = await supabaseClient
                    .from('reviews')
                    .insert([{ name, text, rating }]);

                if (error) {
                    formFeedback.textContent = '❌ ' + (error.message || 'Insert failed.');
                    console.error('Insert error:', error);
                    return;
                }

                this.reset();
                formFeedback.textContent = '✅ Review submitted!';
                formFeedback.style.color = '#4CAF50';
                await fetchAndRenderReviews();

            } catch (err) {
                console.error('Submit error:', err);
                formFeedback.textContent = '⚠️ ' + (err.message || 'Unexpected error.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Review';
                setTimeout(() => {
                    formFeedback.style.color = '';
                }, 3000);
            }
        });

        // ─── RELIABLE STAR RATING (JS enhancement - stars now glow perfectly) ───
        document.addEventListener('DOMContentLoaded', () => {
            const starGroup = document.getElementById('starSelector');
            if (!starGroup) return;

            const labels = Array.from(starGroup.querySelectorAll('label'));
            const inputs = Array.from(starGroup.querySelectorAll('input[type="radio"]'));

            // index 0 = visual rightmost (5 stars), index 4 = visual leftmost (1 star)
            function setStarColors(ratingValue) {
                labels.forEach((label, index) => {
                    const starValue = 5 - index; // map DOM index to actual star value
                    label.style.color = (starValue <= ratingValue) ? 'var(--star-gold)' : 'var(--star-dim)';
                });
            }

            // When a radio is checked (via clicking any label)
            inputs.forEach(input => {
                input.addEventListener('change', () => {
                    if (input.checked) {
                        setStarColors(parseInt(input.value, 10));
                    }
                });
            });

            // Hover effect - preview the rating
            labels.forEach((label, index) => {
                const previewValue = 5 - index;

                label.addEventListener('mouseenter', () => {
                    setStarColors(previewValue);
                });

                label.addEventListener('mouseleave', () => {
                    const checkedInput = starGroup.querySelector('input:checked');
                    if (checkedInput) {
                        setStarColors(parseInt(checkedInput.value, 10));
                    } else {
                        labels.forEach(l => l.style.color = 'var(--star-dim)');
                    }
                });
            });
        });

        // ─── BOOT ──────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', fetchAndRenderReviews);
    </script>
</body>
    </html>
