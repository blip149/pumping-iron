<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlete Reviews — Pumping Iron Creatine</title>
    <meta name="description" content="Real reviews from athletes using Pumping Iron Creatine in Kiambu.">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --red: #C0181A;
            --dark: #1A1A1A;
            --border: #333;
            --gray: #888;
            --light: #CCC;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            background: #0D0D0D;
            color: white;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(13,13,13,0.95);
            backdrop-filter: blur(8px);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--red); }
        .nav-order {
            background: var(--red);
            color: white;
            padding: 0.6rem 1.2rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 4px;
        }

        .wrapper { padding: 80px 1rem 4rem; max-width: 1000px; margin: 0 auto; }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; text-align: center; margin-bottom: 2rem; text-transform: uppercase; }

        .reviews-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .reviews-layout { grid-template-columns: 1fr; }
        }

        .review-box {
            background: var(--dark);
            border: 1px solid var(--border);
            border-top: 4px solid var(--red);
            padding: 2rem;
            border-radius: 8px;
            position: sticky;
            top: 90px;
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--gray); font-weight: 600; font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            color: white;
            padding: 0.9rem;
            border-radius: 4px;
        }
        .star-rating-select {
            font-size: 2.2rem;
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 4px;
        }
        .star-rating-select label { cursor: pointer; color: #444; }
        .star-rating-select label:hover,
        .star-rating-select label:hover \~ label,
        .star-rating-select input:checked \~ label { color: #FFC107; }

        button.submit-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }

        .review-card {
            background: var(--dark);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray);
            border: 1px dashed var(--border);
            border-radius: 8px;
        }

        footer { text-align: center; padding: 3rem 1rem; color: var(--gray); font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <span class="nav-brand">PUMPING IRON</span>
        <a href="/" class="nav-order">GET MY DOSE</a>
    </nav>

    <div class="wrapper">
        <h1>Reviews</h1>

        <div class="reviews-layout">
            <!-- Form -->
            <div>
                <div class="review-box">
                    <h2 style="margin-bottom:1rem; color:white;">Share Your Experience</h2>
                    <form id="submissionForm">
                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" id="athleteName" placeholder="e.g. Peter (Ruiru)" required>
                        </div>

                        <div class="form-group">
                            <label>Rating</label>
                            <div class="star-rating-select">
                                <input type="radio" id="s5" name="rating" value="5" required><label for="s5">★</label>
                                <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
                                <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
                                <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
                                <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Your Review</label>
                            <textarea id="feedbackText" rows="4" placeholder="How has Pumping Iron Creatine helped your training?" required></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="submit-btn">SUBMIT REVIEW</button>
                    </form>
                </div>
            </div>

            <!-- Reviews Feed -->
            <div>
                <div class="feed-header">
                    <h2>Community Reviews</h2>
                    <span id="countDisplay"></span>
                </div>
                <div id="feedContainer">
                    <div class="empty-state">Loading reviews...</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        PUMPING IRON • Kiambu County
    </footer>

    <script>
        const SUPABASE_URL = "https://zhdpiscqxaowjrfidfis.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoZHBpc2NxeGFvd2pyZmlkZmlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDEwNjQsImV4cCI6MjA5NzkxNzA2NH0.RH9CQ6uAYmwqBJaChQdXGrJjVJ6phIVhVBRfmm0Itec";

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchReviews() {
            const container = document.getElementById('feedContainer');
            const counter = document.getElementById('countDisplay');

            try {
                const { data, error } = await supabaseClient
                    .from('reviews')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                counter.textContent = `\( {data.length} Review \){data.length !== 1 ? 's' : ''}`;

                if (data.length === 0) {
                    container.innerHTML = `<div class="empty-state">No reviews yet. Be the first!</div>`;
                    return;
                }

                container.innerHTML = '';
                data.forEach(review => {
                    const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                    const date = new Date(review.created_at).toLocaleDateString('en-KE', {year:'numeric', month:'short', day:'numeric'});

                    const card = document.createElement('div');
                    card.className = 'review-card';
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                            <strong>${review.name}</strong>
                            <span style="color:#FFC107;">${stars}</span>
                        </div>
                        <p>${review.text}</p>
                        <small style="color:var(--gray); display:block; margin-top:1rem; text-align:right;">${date}</small>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Fetch error:", err);
                container.innerHTML = `<div class="empty-state" style="color:#ff6666;">Failed to load reviews</div>`;
            }
        }

        document.getElementById('submissionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "Submitting...";

            try {
                const name = document.getElementById('athleteName').value.trim();
                const text = document.getElementById('feedbackText').value.trim();
                const rating = parseInt(document.querySelector('input[name="rating"]:checked').value);

                const { error } = await supabaseClient.from('reviews').insert([{ name, text, rating }]);
                if (error) throw error;

                alert("✅ Thank you! Review submitted.");
                e.target.reset();
                fetchReviews();
            } catch (err) {
                console.error(err);
                alert("❌ Failed to submit. " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "SUBMIT REVIEW";
            }
        });

        // Load reviews
        window.addEventListener('load', fetchReviews);
    </script>
</body>
    </html>
