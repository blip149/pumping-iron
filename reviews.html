<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlete Reviews — Pumping Iron Creatine</title>
    <meta name="description" content="Read verified reviews from athletes across Kiambu County using Pumping Iron's weight-calculated creatine pre-portioned sachets.">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #C0181A;
            --red-dark: #8B0F11;
            --black: #0D0D0D;
            --dark: #1A1A1A;
            --card: #222222;
            --border: #333333;
            --gray: #888888;
            --light: #CCCCCC;
            --white: #F5F5F5;
            --font-display: 'Bebas Neue', sans-serif;
            --font-head: 'Barlow Condensed', sans-serif;
            --font-body: 'Inter', sans-serif;
            --star-gold: #FFC107;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 5rem;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(13,13,13,0.92);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--red);
            letter-spacing: 0.05em;
            text-decoration: none;
        }

        .nav-order {
            background: var(--red);
            color: var(--white);
            border: none;
            font-family: var(--font-head);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .nav-order:hover { background: var(--red-dark); }

        /* CONTAINER SETUP */
        .wrapper {
            padding: 7rem 1.5rem 4rem;
            max-width: 860px;
            margin: 0 auto;
        }

        .section-label {
            font-family: var(--font-head);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            line-height: 1;
            margin-bottom: 1rem;
            text-align: center;
            text-transform: uppercase;
        }

        .section-sub {
            font-size: 1rem;
            color: var(--light);
            max-width: 480px;
            margin: 0 auto 3rem;
            text-align: center;
            line-height: 1.7;
        }

        /* REVIEW FORM SECTION */
        .review-box {
            background: var(--dark);
            border: 1px solid var(--border);
            border-top: 3px solid var(--red);
            padding: 2.5rem 1.5rem;
            margin-bottom: 4rem;
        }

        .form-heading {
            font-family: var(--font-head);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-family: var(--font-head);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--gray);
            text-transform: uppercase;
        }

        .form-input, .form-textarea {
            background: var(--black);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 1rem;
            padding: 0.85rem 1rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-textarea:focus { border-color: var(--red); }
        .form-input::placeholder, .form-textarea::placeholder { color: var(--border); }

        /* STAR SELECTION */
        .star-rating-select {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.35rem;
        }

        .star-rating-select input { display: none; }

        .star-rating-select label {
            font-size: 2rem;
            color: var(--border);
            cursor: pointer;
            transition: color 0.1s ease;
        }

        .star-rating-select label:hover,
        .star-rating-select label:hover ~ label,
        .star-rating-select input:checked ~ label {
            color: var(--star-gold);
        }

        .submit-btn {
            background: var(--red);
            color: var(--white);
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            padding: 1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .submit-btn:hover { background: var(--red-dark); }
        .submit-btn:disabled { background: var(--border); color: var(--gray); cursor: not-allowed; }

        /* FEED FEEDBACK HEADLINE */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }

        .feed-title { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 0.05em; }
        .feed-count { font-family: var(--font-head); font-size: 0.9rem; color: var(--gray); font-weight: 700; letter-spacing: 0.05em; }

        /* REVIEW CARD ITEM */
        .review-card {
            background: var(--dark);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .athlete-name {
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--white);
            text-transform: uppercase;
        }

        .card-stars { color: var(--star-gold); font-size: 1.1rem; letter-spacing: 0.1em; }
        .card-text { font-size: 0.95rem; color: var(--light); line-height: 1.6; white-space: pre-line; }
        .card-date { font-size: 0.75rem; color: var(--gray); margin-top: 1rem; text-align: right; text-transform: uppercase; letter-spacing: 0.05em; }

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray); border: 1px dashed var(--border); font-size: 0.9rem; }

        footer {
            background: var(--dark);
            border-top: 1px solid var(--border);
            padding: 2rem 1.5rem;
            text-align: center;
            margin-top: 4rem;
        }

        .footer-brand { font-family: var(--font-display); font-size: 2rem; color: var(--red); margin-bottom: 0.5rem; }
        .footer-sub { font-size: 0.85rem; color: var(--gray); }
    </style>
</head>
<body>

    <nav>
        <span class="nav-brand">PUMPING IRON</span>
        <div style="display:flex; gap:1.25rem; align-items:center;">
            <a href="index.html" class="nav-brand">Home</a>
            <a class="nav-order" href="index.html#calculator">GET MY DOSE</a>
        </div>
    </nav>

    <div class="wrapper">
        <!-- <p class="section-label">Verified Performance Logs</p> -->
        <h1 class="section-title">Reviews</h1>
        <!-- <p class="section-sub">Real results from lifters optimizing their supplementation profiles around Kiambu.</p> -->

        <div class="review-box">
            <div class="form-heading">Your Feedback</div>
            <form id="submissionForm">
                <div class="form-group">
                    <label class="form-label" for="athleteName">Your Name / Gym Handle</label>
                    <input class="form-input" type="text" id="athleteName" placeholder="e.g., Alex K. (Ruiru Hub)" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Product Rating</label>
                    <div class="star-rating-select">
                        <input type="radio" id="star5" name="rating" value="5" required><label for="star5" title="5 Stars">★</label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 Stars">★</label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 Stars">★</label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 Stars">★</label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 Star">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="feedbackText">Leave a review</label>
                    <textarea class="form-textarea" id="feedbackText" rows="4" placeholder="How has the custom weight dosing impacted your recovery or power output?" required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">Submit Review</button>
            </form>
        </div>

        <div class="feed-header">
            <span class="feed-title">Reviews</span>
        </div>

        <div id="feedContainer">
            <div class="empty-state">Loading  data from network...</div>
        </div>
    </div>

    <footer>
        <div class="footer-brand">PUMPING IRON</div>
        <div class="footer-sub">Gym Nutrition Prep Service · Kiambu County</div>
    </footer>

    <script>
        // REPLACE THESE WITH YOUR COPIED DETAILS FROM THE SUPABASE DASHBOARD
        const SUPABASE_URL = "https://zhdpiscqxaowjrfidfis.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoZHBpc2NxeGFvd2pyZmlkZmlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDEwNjQsImV4cCI6MjA5NzkxNzA2NH0.RH9CQ6uAYmwqBJaChQdXGrJjVJ6phIVhVBRfmm0Itec";

        // Initialize connection
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fetch and Render from the cloud
        async function fetchAndRenderReviews() {
            const box = document.getElementById('feedContainer');
            const counter = document.getElementById('countDisplay');

            try {
                // Fetch reviews ordered by newest first
                const { data: reviews, error } = await supabase
                    .from('reviews')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                counter.innerText = `${reviews.length} Review${reviews.length !== 1 ? 's' : ''}`;
                box.innerHTML = '';

                if (reviews.length === 0) {
                    box.innerHTML = `<div class="empty-state">No athlete logs documented yet. Be the first to drop your training feedback above!</div>`;
                    return;
                }

                reviews.forEach(item => {
                    const filledStars = '★'.repeat(item.rating);
                    const blankStars = '☆'.repeat(5 - item.rating);
                    
                    // Parse clean date
                    const dbDate = new Date(item.created_at);
                    const formattedDate = dbDate.toLocaleDateString('en-KE', { year: 'numeric', month: 'short', day: 'numeric' });

                    const element = document.createElement('div');
                    element.className = 'review-card';
                    element.innerHTML = `
                        <div class="card-top">
                            <div class="athlete-name">${sanitizeInput(item.name)}</div>
                            <div class="card-stars">${filledStars}${blankStars}</div>
                        </div>
                        <div class="card-text">${sanitizeInput(item.text)}</div>
                        <div class="card-date">${formattedDate}</div>
                    `;
                    box.appendChild(element);
                });

            } catch (err) {
                console.error("Database connection failed:", err);
                counter.innerText = "Error loading reviews";
                box.innerHTML = `<div class="empty-state" style="color:var(--red);">Failed to connect to the central review log. Check internet connection.</div>`;
            }
        }

        function sanitizeInput(input) {
            if (!input) return '';
            return input.replace(/[&<>'"]/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[char] || char));
        }

        // Handle Submission to Cloud
        document.getElementById('submissionForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const handle = document.getElementById('athleteName').value.trim();
            const message = document.getElementById('feedbackText').value.trim();
            const ratingScore = parseInt(document.querySelector('input[name="rating"]:checked').value);
            
            btn.disabled = true;
            btn.innerText = "Syncing with cloud...";

            try {
                // Insert into cloud table
                const { error } = await supabase
                    .from('reviews')
                    .insert([{ name: handle, text: message, rating: ratingScore }]);

                if (error) throw error;

                this.reset();
                await fetchAndRenderReviews();

            } catch (err) {
                alert("Could not post review. Please try again.");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Publish Performance Review";
            }
        });

        // Run on initial load
        window.addEventListener('DOMContentLoaded', fetchAndRenderReviews);
    </script>
</body>
</html>
